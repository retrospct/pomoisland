document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ily: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6d8a0a26-7b10-485d-83e4-f4deff4529fc\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8a560ed2-6162-45a0-a603-f30cbd43a80a\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c17a2117-9588-4e7b-861f-a511e358ff07\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"db30de60-27f4-462c-b925-867c86aa396f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"313ad3f4-fca4-4f57-900b-d54da8e6b06b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cb4b175a-573c-4e44-a531-43e95e7a9ae3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* Folio — color tokens\n   A warm-paper editorial palette: cream neutrals, deep teal primary,\n   burnt-clay secondary. Base palette first, semantic aliases below. */\n:root {\n  /* ---- Base neutrals (warm paper) ---- */\n  --paper:        #F5F5F1; /* app background */\n  --paper-dim:    #EFEFE9; /* recessed background */\n  --card:         #FCFCFA; /* raised surface */\n  --ink:          #17191D; /* near-black, primary text & dark surfaces */\n  --ink-2:        #23262B; /* slightly lifted ink, body on cards */\n  --muted:        #565C63; /* secondary text */\n  --faint:        #878D93; /* tertiary text, captions */\n  --line:         #E3E1D9; /* hairline borders */\n  --line-strong:  #CFCDC4; /* stronger borders, dividers */\n\n  /* ---- Ink-surface (text/colors that sit on --ink) ---- */\n  --on-ink:       #F2F1EC; /* primary text on dark */\n  --on-ink-teal:  #8FC8C0; /* teal accent on dark */\n\n  /* ---- Teal (primary brand) ---- */\n  --teal:         #0F5E57; /* primary accent */\n  --teal-press:   #0B4842; /* pressed / darker */\n  --teal-soft:    #E4EEEC; /* tinted surface */\n  --teal-line:    rgba(15,94,87,0.22); /* teal divider on tinted bg */\n\n  /* ---- Clay (secondary brand) ---- */\n  --clay:         #9A5316; /* secondary accent, warnings/\"don't\" */\n  --clay-press:   #7C4211;\n  --clay-soft:    #F3E7DB;\n\n  /* ---- Semantic: surfaces ---- */\n  --surface-page:    var(--paper);\n  --surface-card:    var(--card);\n  --surface-sunken:  var(--paper-dim);\n  --surface-invert:  var(--ink);\n  --surface-accent:  var(--teal-soft);\n\n  /* ---- Semantic: text ---- */\n  --text-strong:   var(--ink);\n  --text-body:     var(--ink-2);\n  --text-muted:    var(--muted);\n  --text-faint:    var(--faint);\n  --text-invert:   var(--on-ink);\n  --text-accent:   var(--teal);\n\n  /* ---- Semantic: borders ---- */\n  --border-subtle: var(--line);\n  --border-strong: var(--line-strong);\n  --border-accent: var(--teal);\n\n  /* ---- Semantic: interactive ---- */\n  --action-primary:        var(--teal);\n  --action-primary-press:  var(--teal-press);\n  --action-secondary:      var(--clay);\n  --action-secondary-press:var(--clay-press);\n  --focus-ring:            rgba(15,94,87,0.35);\n}\n<\u002Fstyle>\n<style>/* Folio — typography tokens\n   Fraunces for display/headings (editorial serif), Inter for UI/body,\n   IBM Plex Mono for eyebrows, labels, metadata. */\n:root {\n  /* ---- Families ---- */\n  --font-display: \"Fraunces\", Georgia, \"Times New Roman\", serif;\n  --font-sans:    \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ---- Display / heading scale (Fraunces) ---- */\n  --text-display:    3rem;     /* 48px hero */\n  --text-h1:         2.25rem;  /* 36px */\n  --text-h2:         1.5rem;   /* 24px */\n  --text-h3:         1.25rem;  /* 20px */\n  --text-quote:      1.1875rem;/* 19px pull quote */\n\n  /* ---- Body scale (Inter) ---- */\n  --text-lead:       1.0625rem;/* 17px lede */\n  --text-base:       1.03125rem;/* 16.5px body */\n  --text-sm:         0.9375rem;/* 15px */\n  --text-xs:         0.8125rem;/* 13px */\n\n  /* ---- Mono / label scale (IBM Plex Mono) ---- */\n  --text-eyebrow:    0.71875rem;/* 11.5px */\n  --text-label:      0.65625rem;/* 10.5px */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.04;  /* display */\n  --leading-snug:    1.18;  /* headings */\n  --leading-normal:  1.45;  /* quotes */\n  --leading-relaxed: 1.62;  /* body */\n\n  /* ---- Letter spacing ---- */\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.015em;\n  --tracking-body:    -0.005em;\n  --tracking-eyebrow: 0.16em;  /* uppercase mono */\n  --tracking-label:   0.15em;\n}\n<\u002Fstyle>\n<style>/* Folio — spacing, radii, shadows, borders, motion\n   Generous editorial spacing. Subtle borders over heavy shadows. */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  26px;   /* card padding inset */\n  --space-7:  34px;\n  --space-8:  42px;   /* section rhythm */\n  --space-9:  54px;   /* page top inset */\n  --space-10: 72px;\n  --space-12: 90px;   /* page bottom inset */\n\n  /* ---- Radii ---- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;  /* small cards, inputs */\n  --radius-md:   14px;  /* cards, panels */\n  --radius-lg:   18px;\n  --radius-pill: 999px;\n\n  /* ---- Border widths ---- */\n  --border-hair:   1px;\n  --border-medium: 1.5px;\n  --border-accent: 3px;  /* left accent rule */\n\n  /* ---- Shadows (low, warm, restrained) ---- */\n  --shadow-none: none;\n  --shadow-sm:   0 1px 2px rgba(23,25,29,0.05);\n  --shadow-md:   0 2px 8px rgba(23,25,29,0.06), 0 1px 2px rgba(23,25,29,0.04);\n  --shadow-lg:   0 8px 28px rgba(23,25,29,0.10), 0 2px 6px rgba(23,25,29,0.05);\n\n  /* ---- Layout ---- */\n  --measure:     730px;  /* max reading width */\n  --measure-narrow: 54ch; /* lede / prose measure */\n\n  /* ---- Motion ---- */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);   /* @kind other */\n  --duration-fast:   120ms; /* @kind other */\n  --duration-base:   200ms; /* @kind other */\n  --duration-slow:   500ms; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* Folio Design System — global entry point.\n   Consumers link this single file. @import lines only. */\n/* Folio — webfonts\n   Fraunces (serif display), Inter (sans body), IBM Plex Mono (mono).\n   Loaded from Google Fonts. If you need self-hosted binaries, swap these\n   @import lines for local @font-face rules pointing at assets/fonts/. */\n/* vietnamese */\n@font-face {\n  font-family: 'Fraunces';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ec78e271-df43-489d-973c-63aa818ec794\") format('woff2');\n  unico ormal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"313ad3f4-fca4-4f57-900b-d54da8e6b06b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"cb4b175a-573c-4e44-a531-43e95e7a9ae3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4332ca17-ff96-4b2f-977c-30ae3725d91e\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6d8a0a26-7b10-485d-83e4-f4deff4529fc\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8a560ed2-6162-45a0-a603-f30cbd43a80a\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c17a2117-9588-4e7b-861f-a511e358ff07\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"db30de60-27f4-462c-b925-867c86aa396f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"313ad3f4-fca4-4f57-900b-d54da8e6b06b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cb4b175a-573c-4e44-a531-43e95e7a9ae3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Folio — color tokens\n   A warm-paper editorial palette: cream neutrals, deep teal primary,\n   burnt-clay secondary. Base palette first, semantic aliases below. */\n:root {\n  /* ---- Base neutrals (warm paper) ---- */\n  --paper:        #F5F5F1; /* app background */\n  --paper-dim:    #EFEFE9; /* recessed background */\n  --card:         #FCFCFA; /* raised surface */\n  --ink:          #17191D; /* near-black, primary text & dark surfaces */\n  --ink-2:        #23262B; /* slightly lifted ink, body on cards */\n  --muted:        #565C63; /* secondary text */\n  --faint:        #878D93; /* tertiary text, captions */\n  --line:         #E3E1D9; /* hairline borders */\n  --line-strong:  #CFCDC4; /* stronger borders, dividers */\n\n  /* ---- Ink-surface (text/colors that sit on --ink) ---- */\n  --on-ink:       #F2F1EC; /* primary text on dark */\n  --on-ink-teal:  #8FC8C0; /* teal accent on dark */\n\n  /* ---- Teal (primary brand) ---- */\n  --teal:         #0F5E57; /* primary accent */\n  --teal-press:   #0B4842; /* pressed / darker */\n  --teal-soft:    #E4EEEC; /* tinted surface */\n  --teal-line:    rgba(15,94,87,0.22); /* teal divider on tinted bg */\n\n  /* ---- Clay (secondary brand) ---- */\n  --clay:         #9A5316; /* secondary accent, warnings/\"don't\" */\n  --clay-press:   #7C4211;\n  --clay-soft:    #F3E7DB;\n\n  /* ---- Semantic: surfaces ---- */\n  --surface-page:    var(--paper);\n  --surface-card:    var(--card);\n  --surface-sunken:  var(--paper-dim);\n  --surface-invert:  var(--ink);\n  --surface-accent:  var(--teal-soft);\n\n  /* ---- Semantic: text ---- */\n  --text-strong:   var(--ink);\n  --text-body:     var(--ink-2);\n  --text-muted:    var(--muted);\n  --text-faint:    var(--faint);\n  --text-invert:   var(--on-ink);\n  --text-accent:   var(--teal);\n\n  /* ---- Semantic: borders ---- */\n  --border-subtle: var(--line);\n  --border-strong: var(--line-strong);\n  --border-accent: var(--teal);\n\n  /* ---- Semantic: interactive ---- */\n  --action-primary:        var(--teal);\n  --action-primary-press:  var(--teal-press);\n  --action-secondary:      var(--clay);\n  --action-secondary-press:var(--clay-press);\n  --focus-ring:            rgba(15,94,87,0.35);\n}\n\n/* Folio — typography tokens\n   Fraunces for display/headings (editorial serif), Inter for UI/body,\n   IBM Plex Mono for eyebrows, labels, metadata. */\n:root {\n  /* ---- Families ---- */\n  --font-display: \"Fraunces\", Georgia, \"Times New Roman\", serif;\n  --font-sans:    \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* ---- Display / heading scale (Fraunces) ---- */\n  --text-display:    3rem;     /* 48px hero */\n  --text-h1:         2.25rem;  /* 36px */\n  --text-h2:         1.5rem;   /* 24px */\n  --text-h3:         1.25rem;  /* 20px */\n  --text-quote:      1.1875rem;/* 19px pull quote */\n\n  /* ---- Body scale (Inter) ---- */\n  --text-lead:       1.0625rem;/* 17px lede */\n  --text-base:       1.03125rem;/* 16.5px body */\n  --text-sm:         0.9375rem;/* 15px */\n  --text-xs:         0.8125rem;/* 13px */\n\n  /* ---- Mono / label scale (IBM Plex Mono) ---- */\n  --text-eyebrow:    0.71875rem;/* 11.5px */\n  --text-label:      0.65625rem;/* 10.5px */\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.04;  /* display */\n  --leading-snug:    1.18;  /* headings */\n  --leading-normal:  1.45;  /* quotes */\n  --leading-relaxed: 1.62;  /* body */\n\n  /* ---- Letter spacing ---- */\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.015em;\n  --tracking-body:    -0.005em;\n  --tracking-eyebrow: 0.16em;  /* uppercase mono */\n  --tracking-label:   0.15em;\n}\n\n/* Folio — spacing, radii, shadows, borders, motion\n   Generous editorial spacing. Subtle borders over heavy shadows. */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  26px;   /* card padding inset */\n  --space-7:  34px;\n  --space-8:  42px;   /* section rhythm */\n  --space-9:  54px;   /* page top inset */\n  --space-10: 72px;\n  --space-12: 90px;   /* page bottom inset */\n\n  /* ---- Radii ---- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;  /* small cards, inputs */\n  --radius-md:   14px;  /* cards, panels */\n  --radius-lg:   18px;\n  --radius-pill: 999px;\n\n  /* ---- Border widths ---- */\n  --border-hair:   1px;\n  --border-medium: 1.5px;\n  --border-accent: 3px;  /* left accent rule */\n\n  /* ---- Shadows (low, warm, restrained) ---- */\n  --shadow-none: none;\n  --shadow-sm:   0 1px 2px rgba(23,25,29,0.05);\n  --shadow-md:   0 2px 8px rgba(23,25,29,0.06), 0 1px 2px rgba(23,25,29,0.04);\n  --shadow-lg:   0 8px 28px rgba(23,25,29,0.10), 0 2px 6px rgba(23,25,29,0.05);\n\n  /* ---- Layout ---- */\n  --measure:     730px;  /* max reading width */\n  --measure-narrow: 54ch; /* lede / prose measure */\n\n  /* ---- Motion ---- */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);   /* @kind other */\n  --duration-fast:   120ms; /* @kind other */\n  --duration-base:   200ms; /* @kind other */\n  --duration-slow:   500ms; /* @kind other */\n}\n\n<\u002Fstyle>\n<script src=\"024d71a5-f5bc-41f7-aaac-9f2a5b232250\"><\u002Fscript>\n<\u002Fhelmet>\n\n<!-- ===== TITLE ===== -->\n<div style=\"position:absolute;left:80px;top:60px;width:660px;\">\n  <div style=\"font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal);font-weight:500;margin-bottom:14px;\">Pomodoro · Dynamic Island<\u002Fdiv>\n  <h1 style=\"font-family:var(--font-display);font-weight:500;font-size:46px;line-height:1.04;letter-spacing:-0.02em;color:var(--ink);margin:0 0 16px;\">Stay in the pocket.<\u002Fh1>\n  <p style=\"font-family:var(--font-sans);font-size:17px;line-height:1.6;letter-spacing:-0.005em;color:var(--ink-2);margin:0;max-width:540px;\">A focus timer that lives where your eyes already are — wrapped around the MacBook notch, or floating on any display. It glances small, expands on a tap, and nudges you along.<\u002Fp>\n<\u002Fdiv>\n\n<!-- ===== SYSTEM NOTE POST-IT ===== -->\n<div style=\"position:absolute;left:800px;top:64px;width:300px;background:#FBEFA6;padding:18px 18px 16px;box-shadow:0 6px 20px rgba(23,25,29,0.12);transform:rotate(1.4deg);font-family:var(--font-sans);\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#8A6D12;margin-bottom:9px;\">For the build<\u002Fdiv>\n  <div style=\"font-size:13.5px;line-height:1.5;color:#4A3D0E;\">Same island component, two placements. <b>Mode 1<\u002Fb> hugs the camera notch (Electron window pinned top-center). <b>Mode 2<\u002Fb> is a free-floating window, draggable ort name=\"NotchConcept\" variant=\"outline\" label=\"FOCUS\" time=\"24:00\" progress=\"0.62\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:744px;top:1926px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;\">C · Outline + glow<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Filled edge emits a soft glow.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"glow\" label=\"FOCUS\" time=\"16:20\" progress=\"0.4\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:1076px;top:1926px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--clay);margin-bottom:6px;\">D · Glow at the front<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Leading point pulses as it advances.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"front\" label=\"FOCUS\" time=\"09:12\" progress=\"0.72\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:80px;top:2186px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;\">E · Underlight<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Light spills out from beneath the housing.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"underlight\" label=\"FOCUS\" time=\"18:30\" progress=\"0.5\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:412px;top:2186px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;\">F · Converge<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Both sides fill inward, meeting at center.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"converge\" label=\"FOCUS\" time=\"12:00\" progress=\"0.5\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:744px;top:2186px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;\">G · Split<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Grows from center bottom out to both corners.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"split\" label=\"FOCUS\" time=\"21:40\" progress=\"0.45\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:1076px;top:2186px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--clay);margin-bottom:6px;\">H · Comet<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:14px;\">Two sparks chase around the outline.<\u002Fdiv>\n  <div style=\"display:flex;justify-content:center;\"><dc-import name=\"NotchConcept\" variant=\"comet\" label=\"FOCUS\" time=\"07:50\" progress=\"0.66\" accent=\"#A78BFA\" accent-bright=\"#D9CCFF\" hint-size=\"260px,128px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== COMPLETE RIPPLE EXPLORATION ===== -->\n<div style=\"position:absolute;left:80px;top:2470px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:500;\">06 — Completion ripple <span style=\"color:var(--faint);\">· timing &amp; intensity<\u002Fspan><\u002Fdiv>\n<div style=\"position:absolute;left:80px;top:2496px;font-family:var(--font-sans);font-size:14px;color:var(--faint);max-width:820px;\">Slower now, so each ring is felt. Four ways to shape the burst — vary the count, stagger, and how sharply each ripple fades.<\u002Fdiv>\n\n<div style=\"position:absolute;left:80px;top:2546px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;\">Burst<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:16px;\">3 rings, tight stagger, fading strength.<\u002Fdiv>\n  <div style=\"height:92px;background:#1E211C;border-radius:11px;display:grid;place-items:center;overflow:hidden;\"><dc-import name=\"RippleConcept\" variant=\"burst\" hint-size=\"170px,46px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:412px;top:2546px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;\">Echo<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:16px;\">Wide stagger, slow, calm spacing.<\u002Fdiv>\n  <div style=\"height:92px;background:#1E211C;border-radius:11px;display:grid;place-items:center;overflow:hidden;\"><dc-import name=\"RippleConcept\" variant=\"echo\" hint-size=\"170px,46px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:744px;top:2546px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;\">Heartbeat<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:16px;\">Two strong pulses, then a beat of rest.<\u002Fdiv>\n  <div style=\"height:92px;background:#1E211C;border-radius:11px;display:grid;place-items:center;overflow:hidden;\"><dc-import name=\"RippleConcept\" variant=\"heartbeat\" hint-size=\"170px,46px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:1076px;top:2546px;width:300px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--clay);margin-bottom:4px;\">Bloom<\u002Fdiv>\n  <div style=\"font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-bottom:16px;\">One big, slow, deliberate wave.<\u002Fdiv>\n  <div style=\"height:92px;background:#1E211C;border-radius:11px;display:grid;place-items:center;overflow:hidden;\"><dc-import name=\"RippleConcept\" variant=\"bloom\" hint-size=\"170px,46px\"><\u002Fdc-import><\u002Fdiv>\n<\u002Fdiv>\n<!-- ===== SETTINGS ===== -->\n<div style=\"position:absolute;left:80px;top:2880px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:500;\">07 — Settings <span style=\"color:var(--faint);\">· opened from the ⋯ menu · interactive<\u002Fspan><\u002Fdiv>\n<div style=\"position:absolute;left:80px;top:2906px;font-family:var(--font-sans);font-size:14px;color:var(--faint);max-width:820px;\">A real preferences window. Two presets plus a Custom mode whose fields stay editable, alarm &amp; animation pickers, accent + light/dark theming (live), timer-style and layout choices, and the behavior toggles. Click around — the sidebar, theme, and accent all respond.<\u002Fdiv>\n\n<div style=\"position:absolute;left:80px;top:2960px;width:780px;background:var(--card);border:1px solid var(--line-strong);border-radius:16px;box-shadow:var(--shadow-md);padding:16px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;\">Timer · dark · classic<\u002Fdiv>\n  <dc-import name=\"Settings\" theme=\"dark\" section=\"timer\" accent=\"#8FC8C0\" hint-size=\"780px,600px\"><\u002Fdc-import>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:900px;top:2960px;width:780px;background:var(--card);border:1px solid var(--line-strong);border-radius:16px;box-shadow:var(--shadow-md);padding:16px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;\">Appearance · accent &amp; timer style<\u002Fdiv>\n  <dc-import name=\"Settings\" theme=\"dark\" section=\"appearance\" accent=\"#8FC8C0\" hint-size=\"780px,600px\"><\u002Fdc-import>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:80px;top:3640px;width:780px;background:var(--card);border:1px solid var(--line-strong);border-radius:16px;box-shadow:var(--shadow-md);padding:16px;box-sizing:border-box;\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--clay);margin-bottom:12px;\">Sounds · light theme<\u002Fdiv>\n  <dc-import name=\"Settings\" theme=\"light\" section=\"sounds\" accent=\"#0F5E57\" hint-size=\"780px,600px\"><\u002Fdc-import>\n<\u002Fdiv>\n\n<div style=\"position:absolute;left:900px;top:3640px;width:300px;background:#FBEFA6;padding:18px;box-shadow:0 6px 20px rgba(23,25,29,0.12);transform:rotate(1deg);font-family:var(--font-sans);\">\n  <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#8A6D12;margin-bottom:9px;\">Settings notes<\u002Fdiv>\n  <div style=\"font-size:13px;line-height:1.5;color:#4A3D0E;\">Window is fully themed off a single accent + light/dark token set, so the same surface reskins instantly. <b>Custom<\u002Fb> preset persists its own focus / break lengths. Everything here maps to a real preference the Electron app would store.<\u002Fdiv>\n<\u002Fdiv><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { status:'idle', mode:'focus', total:1500, remaining:1500, sessionIndex:0, sessionTotal:4, expanded:false, speed:1, task:'Draft the Q3 narrative', snapped:true, dragging:false, dragX:0, dragY:0, nearSnap:false, toast:null, peek:false, showMessages:true };\n  _screen = React.createRef();\n\n  componentDidMount(){\n    this._timer=setInterval(()=>this.tick(),250);\n    this._mm=(e)=>this.onDrag(e); this._mu=()=>this.endDrag();\n    window.addEventListener('mousemove',this._mm);\n    window.addEventListener('mouseup',this._mu);\n  }\n  componentWillUnmount(){\n    clearInterval(this._timer); clearTimeout(this._next); clearTimeout(this._toast);\n    window.removeEventListener('mousemove',this._mm);\n    window.removeEventListener('mouseup',this._mu);\n  }\n\n  startDrag = (e) => {\n    if(this.state.expanded) return;\n    if(e && e.target && e.target.closest && e.target.closest('button')) return;\n    this._dragging=true; this._moved=false;\n    this.setState({dragging:true, peek:false});\n  };\n  peekEnter = () => { if(this.state.expanded || this.state.dragging || !this.state.snapped) return; this.setState({peek:true}); };\n  peekLeave = () => { if(this.state.peek) this.setState({peek:false}); };\n  onDrag = (e) => {\n    if(!this._dragging) return;\n    const sc=this._screen.current; if(!sc) return;\n    const r=sc.getBoundingClientRect();\n    let x=e.clientX-r.left, y=e.clientY-r.top;\n    x=Math.max(46,Math.min(r.width-46,x));\n    y=Math.max(2,Math.min(r.height-30,y));\n    this._moved=true;\n    const near = Math.abs(x-r.width/2)<100 && y<60;\n    this.setState({snapped:false, dragX:x, dragY:y, nearSnap:near});\n  };\n  endDrag = () => {\n    if(!this._dragging) return;\n    this._dragging=false;\n    this._justDragged=this._moved;\n    if(this._moved){ this.setState({dragging:false, snapped:this.state.nearSnap, nearSnap:false}); }\n    else { this.setState({dragging:false, nearSnap:false}); }\n    setTimeout(()=>{ this._justDragged=false; },40);\n  };\n\n  showToast(msg){ clearTimeout(this._toast); this.setState({toast:msg}); this._toast=setTimeout(()=>this.setState({toast:null}),1900); }\n  switchMode = () => {\n    const s=this.state;\n    if(s.mode==='focus'){ this.setState({mode:'break',total:300,remaining:300}); this.showToast('Switched to break'); }\n    else { this.setState({mode:'focus',total:1500,remaining:1500}); this.showToast('Switched to focus'); }\n  };\n  toggleMessages = () => this.setState(s=>({showMessages:!s.showMessages}));\n  backdropClick = (e) => {\n    if(!this.state.expanded) return;\n    if(e && e.target && e.target.closest && e.target.closest('[data-island]')) return;\n    this.setState({expanded:false});\n  };\n  quit = () => { clearTimeout(this._next); this.setState({status:'idle',mode:'focus',total:1500,remaining:1500,sessionIndex:0,expanded:false}); this.showToast('Timer quit — back to idle'); };\n\n  tick(){\n    const s=this.state;\n    if(s.status!=='running') return;\n    const step=s.speed*0.25;\n    const rem=s.remaining-step;\n    if(rem<=0){ this.complete(); } else { this.setState({remaining:rem}); }\n  }\n  complete(){\n    clearTimeout(this._next);\n    this.setState({remaining:0,status:'complete'});\n    this._next=setTimeout(()=>this.advance(),2600);\n  }\n  advance(){\n    const s=this.state;\n    if(s.mode==='focus'){\n      const idx=s.sessionIndex+1;\n      const isLong=idx%4===0;\n      this.setState({mode:'break',total:isLong?900:300,remaining:isLong?900:300,status:'running',sessionIndex:idx});\n    } else {\n      this.setState({mode:'focus',total:1500,remaining:1500,status:'running'});\n    }\n  }\n\n  playPause = () => {\n    const s=this.state;\n    if(s.status==='running') this.setState({status:'paused'});\n    else if(s.status==='paused'||s.status==='idle') this.setState({status:'running'});\n    else if(s.status==='complete'){ clearTimeout(this._next); this.advance(); }\n  };\n  reset = () => {\n    clearTimeout(this._next);\n    this.setState({status:'idle',mode:'focus',total:1500,remaining:1500,sessionIndex:0});\n  };\n  skip = () => { clearTimeout(this._next); this.setState({remaining:4,status:'running'}); };\n  toggleExpand = () => { if(this._justDragged) return; this.setState(s=>({expanded:!s.expanded})); };\n  setSpeed1 = () => this.setState({speed:1});\n  setSpeed20 = () => this.setState({speed:20});\n\n  renderVals(){\n    const s=this.state;\n    const segBase='border:none;cursor:pointer;padding:8px 14px;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:13px;transition:all .15s;';\n    const segOn='border:none;cursor:pointer;padding:8px 14px;background:var(--teal);color:var(--on-ink);font-family:var(--font-mono);font-size:13px;';\n    const t=Math.ceil(s.remaining), mm=Math.floor(t/60), ss=t%60;\n    const time=(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss;\n    const modeLabel = s.mode==='break'?'Break':'Focus';\n    const statusWord = s.status==='complete'?'done':s.status;\n    const snapTrans = s.dragging? 'none' : 'left .34s cubic-bezier(.34,1.3,.5,1), top .34s cubic-bezier(.34,1.3,.5,1)';\n    const mountStyle = s.snapped\n      ? { position:'absolute', top:'0px', left:'50%', transform:'translateX(-50%)', zIndex:6, transition:snapTrans }\n      : { position:'absolute', left:s.dragX+'px', top:s.dragY+'px', transform:'translate(-50%,0)', zIndex:6, transition:snapTrans, cursor:'grabbing' };\n    return {\n      status:s.status, mode:s.mode, total:s.total, remaining:s.remaining,\n      expanded:s.expanded, sessionIndex:s.sessionIndex, sessionTotal:s.sessionTotal, task:s.task,\n      playPause:this.playPause, reset:this.reset, skip:this.skip, toggleExpand:this.toggleExpand,\n      setSpeed1:this.setSpeed1, setSpeed20:this.setSpeed20,\n      snapped:s.snapped, dragging:s.dragging, nearSnap:s.nearSnap, toast:s.toast, hasToast:!!s.toast,\n      screenRef:this._screen, mountStyle,\n      startDrag:this.startDrag, switchMode:this.switchMode, quit:this.quit,\n      backdropClick:this.backdropClick, showMessages:s.showMessages, toggleMessages:this.toggleMessages,\n      peekEnter:this.peekEnter, peekLeave:this.peekLeave,\n      peekActive: s.peek && !s.expanded && s.snapped && !s.dragging,\n      snapGlow: s.dragging && s.nearSnap,\n      showDropHint: s.dragging && !s.snapped,\n      playPauseLabel: s.status==='running'?'Pause':(s.status==='complete'?'Continue':'Start'),\n      expandLabel: s.expanded?'Collapse':'Expand',\n      speed1Style: s.speed===1?segOn:segBase,\n      speed20Style: s.speed===20?segOn:segBase,\n      stateReadout: modeLabel+' · '+statusWord+' · '+time\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
